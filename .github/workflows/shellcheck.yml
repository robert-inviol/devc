name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          # devc.zsh and devc.fish use shell-specific syntax that ShellCheck
          # (a bash linter) can't reason about. They're excluded from CI.
          ignore_names: devc.zsh devc.fish
